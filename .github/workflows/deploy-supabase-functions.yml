name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy decode-jd --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy tailor-resume --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy generate-resume --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy compare-resume --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy generate-bullet --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy parse-resume-file --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

